<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        .container2{
           
           height: 400px;
           width: 400px; 
           background-color: burlywood;
           color: crimson;
           margin-top: 150px;
           margin-left: 500px;
           border-radius: 30px;
           box-shadow: 3px 6px 9px rgb(183, 139, 148);
        }

        div>form>label{
            letter-spacing: 5px;
            margin-left: 30px;
                        
        }

        div>form>input{
            
            box-shadow: 2px 5px 7px black; 
            border-radius: 30px;
            height: 40px;
            width: 300px;
            margin-top: 10px;
            margin-left: 30px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
        }

        div>form>button{

            height: 50px;
            width: 200px;
            background-color: black;
            color: brown;
            border-radius: 30px;
            box-shadow: 2px 4px 8px rgb(58, 47, 47);
            margin-top: 30px;
            margin-left: 80px;
        }
    </style>

</head>
<body>
    <div class="container2">

    <form action="http://localhost:8080/add/students" method="post">
        <label for="rno">Enter Roll No:</label>
        <input type="number" name="rno" placeholder="enter your rollno">
        <br>

        <label for="name">Enter name:</label>
        <input type="text" name="name" placeholder="enter your name">
        <br>

        <label for="tech">Enter technology:</label>
        <input type="text" name="technology" placeholder="enter your technology">
        <br>

        <button type="submit"> <a href="./details.html"></a>Submit</button>
    </form>
    </div>

    
</body>
</html>
